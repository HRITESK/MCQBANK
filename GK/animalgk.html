<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Animal GK Quiz — UPSC MCQ Kingdom</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet"/>
<style>
  :root { --bg:#0a0e1a; --bg2:#111822; --bg3:#0d1520; --green:#22c55e; --green2:#16a34a; --text:#e2e8f0; --muted:#64748b; --border:#1e293b; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'Source Sans 3',sans-serif; min-height:100vh; }

  /* NAV */
  nav { background:rgba(10,14,26,0.95); border-bottom:1px solid var(--border); padding:12px 20px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; }
  .nav-back { color:var(--green); text-decoration:none; font-size:14px; display:flex; align-items:center; gap:6px; }
  .nav-title { font-family:'Playfair Display',serif; color:#a5d6a7; font-size:16px; }

  /* SCREENS */
  .screen { display:none; max-width:500px; margin:0 auto; padding:20px 16px 50px; }
  .screen.active { display:block; }

  /* MENU */
  .menu-hero { text-align:center; padding:30px 0 24px; }
  .menu-emoji { font-size:56px; display:block; margin-bottom:12px; }
  .menu-title { font-family:'Playfair Display',serif; color:#a5d6a7; font-size:28px; font-weight:900; margin-bottom:6px; }
  .menu-sub { color:#66bb6a; font-size:12px; letter-spacing:2px; text-transform:uppercase; }

  .stats-row { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin:20px 0 24px; }
  .stat-box { background:var(--bg2); border:1px solid var(--border); border-radius:12px; padding:14px 8px; text-align:center; }
  .stat-val { color:#66bb6a; font-size:22px; font-weight:700; font-family:'Playfair Display',serif; display:block; }
  .stat-lbl { color:var(--muted); font-size:11px; }

  .start-btn { width:100%; padding:16px; background:linear-gradient(135deg,#1b5e20,#2e7d32); color:#fff; border:none; border-radius:50px; font-size:18px; font-family:inherit; font-weight:600; cursor:pointer; letter-spacing:1px; transition:all 0.2s; margin-bottom:16px; }
  .start-btn:hover { transform:scale(1.02); box-shadow:0 0 30px #2e7d3255; }

  .divider { color:var(--muted); font-size:13px; text-align:center; margin-bottom:14px; }

  .cat-list { display:flex; flex-direction:column; gap:8px; }
  .cat-btn { background:var(--bg2); border:2px solid var(--border); color:#a5d6a7; padding:12px 16px; border-radius:10px; cursor:pointer; font-size:14px; font-family:inherit; text-align:left; transition:all 0.2s; display:flex; align-items:center; justify-content:space-between; }
  .cat-btn:hover { border-color:var(--green); background:#162016; transform:translateX(4px); }
  .cat-count { background:#1b3a1b; border-radius:20px; padding:2px 10px; font-size:12px; color:#81c784; }

  /* QUIZ */
  .quiz-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
  .quiz-back { background:none; border:none; color:var(--muted); font-size:22px; cursor:pointer; }
  .quiz-cat { color:var(--muted); font-size:13px; font-weight:600; }
  .quiz-score { background:#1b3a1b; color:#81c784; padding:4px 12px; border-radius:20px; font-size:13px; }

  .progress-wrap { background:#1a2a1a; border-radius:8px; height:6px; margin-bottom:18px; overflow:hidden; }
  .progress-bar { height:100%; background:linear-gradient(90deg,#2e7d32,#66bb6a); border-radius:8px; transition:width 0.4s; }

  .q-number { color:var(--muted); font-size:12px; letter-spacing:2px; text-transform:uppercase; margin-bottom:8px; }
  .q-cat-tag { display:inline-block; background:#0d2a0d; color:#66bb6a; font-size:11px; padding:3px 10px; border-radius:20px; margin-bottom:12px; border:1px solid #1b4a1b; letter-spacing:1px; }
  .q-box { background:var(--bg2); border:1px solid var(--border); border-radius:16px; padding:20px 18px; margin-bottom:18px; }
  .q-text { color:#e8f5e9; font-size:17px; line-height:1.6; font-family:'Playfair Display',serif; font-weight:700; }

  .opt-btn { width:100%; padding:14px 16px; border-radius:12px; border:2px solid var(--border); background:var(--bg2); color:#c8e6c9; font-size:15px; font-family:inherit; cursor:pointer; text-align:left; transition:all 0.15s; margin-bottom:10px; display:flex; align-items:center; gap:10px; }
  .opt-btn:hover:not(:disabled) { border-color:#388e3c; background:#162016; }
  .opt-btn:disabled { cursor:default; }
  .opt-btn.correct { border-color:#2e7d32; background:#0d2a0d; color:#a5d6a7; }
  .opt-btn.wrong { border-color:#c62828; background:#2a0d0d; color:#ef9a9a; }
  .opt-letter { width:26px; height:26px; border-radius:50%; background:#1b3a1b; color:#81c784; font-size:13px; text-align:center; line-height:26px; font-weight:700; flex-shrink:0; transition:background 0.15s; }
  .opt-btn.correct .opt-letter { background:#1b5e20; color:#a5d6a7; }
  .opt-btn.wrong .opt-letter { background:#4a1010; color:#ef9a9a; }
  .opt-icon { margin-left:auto; }

  .fact-box { background:#0d1a0d; border:1px solid #1b4a1b; border-radius:12px; padding:14px 16px; margin-bottom:16px; }
  .fact-label { color:#66bb6a; font-size:12px; font-weight:700; letter-spacing:1px; text-transform:uppercase; margin-bottom:6px; }
  .fact-text { color:#a5d6a7; font-size:14px; line-height:1.6; }

  .next-btn { width:100%; padding:14px; border-radius:50px; border:none; background:linear-gradient(135deg,#1b5e20,#2e7d32); color:#fff; font-size:16px; font-family:inherit; font-weight:600; cursor:pointer; transition:all 0.2s; }
  .next-btn:hover { transform:scale(1.02); box-shadow:0 0 20px #2e7d3244; }

  /* RESULTS */
  .result-box { background:var(--bg2); border:1px solid var(--border); border-radius:20px; padding:28px 20px; text-align:center; margin-bottom:24px; }
  .result-emoji { font-size:52px; margin-bottom:10px; }
  .result-title { font-family:'Playfair Display',serif; color:#a5d6a7; font-size:26px; margin-bottom:8px; }
  .result-pct { font-size:56px; font-weight:900; font-family:'Playfair Display',serif; }
  .result-grade { font-size:20px; font-weight:600; margin-top:4px; }
  .result-detail { color:var(--muted); font-size:14px; margin-top:10px; }
  .result-stats { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-top:18px; }
  .rs-box { background:#0d1a0d; border-radius:10px; padding:10px 6px; }
  .rs-icon { font-size:20px; }
  .rs-val { color:#a5d6a7; font-size:18px; font-weight:700; display:block; }
  .rs-lbl { color:var(--muted); font-size:11px; }

  .wrong-section { background:#1a0e0e; border:1px solid #3a1a1a; border-radius:16px; padding:20px; margin-bottom:24px; }
  .wrong-title { color:#ef9a9a; font-family:'Playfair Display',serif; font-size:17px; margin-bottom:14px; }
  .wrong-item { background:#110808; border-radius:10px; padding:14px; border-left:3px solid #c62828; margin-bottom:10px; }
  .wrong-q { color:#ef9a9a; font-size:13px; font-weight:600; margin-bottom:6px; }
  .wrong-ans { color:#81c784; font-size:13px; }
  .wrong-fact { color:#78909c; font-size:12px; margin-top:4px; }

  .result-btns { display:flex; gap:10px; }
  .res-btn { flex:1; padding:13px; border-radius:50px; border:1px solid #2e7d32; background:#1b3a1b; color:#81c784; font-size:15px; font-family:inherit; cursor:pointer; transition:all 0.2s; }
  .res-btn:hover { background:#2e7d32; color:#fff; }
  .res-btn.primary { background:#1b4a1b; border-color:#388e3c; }

  @media(max-width:400px) { .stats-row { grid-template-columns:repeat(3,1fr); } }
</style>
</head>

  <div class="q-box"><div class="q-text" id="qText"></div></div>

</div>

<!-- RESULTS SCREEN -->
<div class="screen" id="resultsScreen">
  <div class="result-box">
    <div class="result-emoji">🏆</div>
    <div class="result-title">Quiz Complete!</div>
    <div class="result-pct" id="resPct"></div>

    <div class="result-detail" id="resDetail"></div>
    <div class="result-stats">
      <div class="rs-box"><div class="rs-icon">✅</div><span class="rs-val" id="rsCorrect"></span><span class="rs-lbl">Correct</span></div>
      <div class="rs-box"><div class="rs-icon">❌</div><span class="rs-val" id="rsWrong"></span><span class="rs-lbl">Wrong</span></div>
      <div class="rs-box"><div class="rs-icon">📊</div><span class="rs-val" id="rsScore"></span><span class="rs-lbl">Score</span></div>
    </div>
  </div>
  <div class="wrong-section" id="wrongSection" style="display:none">
    <div class="wrong-title" id="wrongTitle"></div>
    <div id="wrongList"></div>
  </div>
  <div class="result-btns">
    <button class="res-btn" onclick="goMenu()">🏠 Menu</button>
    <button class="res-btn primary" onclick="retryQuiz()">🔄 Retry</button>
  </div>
</div>

<script>
const ALL_QUESTIONS = [
  {id:1,cat:"Basic Facts",q:"Which is the fastest land animal?",opts:["Lion","Cheetah","Horse","Leopard"],ans:1,fact:"Cheetah runs up to 120 km/h (75 mph)"},
  {id:2,cat:"Basic Facts",q:"Which is the largest land animal?",opts:["Hippopotamus","Rhinoceros","Elephant","Giraffe"],ans:2,fact:"African elephant is the world's largest land animal"},
  {id:3,cat:"Basic Facts",q:"Which is the tallest animal in the world?",opts:["Elephant","Camel","Giraffe","Ostrich"],ans:2,fact:"Giraffe can grow up to 5.5–6 metres tall"},
  {id:4,cat:"Basic Facts",q:"Which is the largest animal in the world?",opts:["Great White Shark","Blue Whale","Elephant","Whale Shark"],ans:1,fact:"Blue whale can grow up to 30 metres and weigh 200 tons"},
  {id:5,cat:"Basic Facts",q:"Which is the largest fish in the world?",opts:["Great White Shark","Whale Shark","Blue Whale","Manta Ray"],ans:1,fact:"Whale shark is the largest fish; blue whale is a mammal"},
  {id:6,cat:"Basic Facts",q:"Which is the slowest animal in the world?",opts:["Sloth","Snail","Tortoise","Koala"],ans:0,fact:"Three-toed sloth moves at 0.03 mph on land"},
  {id:7,cat:"Basic Facts",q:"Which bird lays the largest egg?",opts:["Peacock","Flamingo","Ostrich","Emu"],ans:2,fact:"Ostrich egg weighs about 1.4 kg"},
  {id:8,cat:"Basic Facts",q:"Which is the smallest bird in the world?",opts:["Sparrow","Hummingbird","Wren","Swallow"],ans:1,fact:"Bee hummingbird of Cuba is the world's smallest bird at 5 cm"},
  {id:9,cat:"Basic Facts",q:"Which animal has the longest lifespan?",opts:["Elephant","Tortoise","Whale","Crocodile"],ans:1,fact:"Some tortoises live over 200 years"},
  {id:10,cat:"Basic Facts",q:"Which is the largest land carnivore?",opts:["Tiger","Lion","Polar Bear","Grizzly Bear"],ans:2,fact:"Polar bear is the largest land carnivore"},
  {id:11,cat:"Basic Facts",q:"Which is the loudest insect?",opts:["Cricket","Grasshopper","Cicada","Locust"],ans:2,fact:"Cicada can produce sounds up to 120 dB"},
  {id:12,cat:"Basic Facts",q:"Which is the most dangerous creature in the world?",opts:["Shark","Crocodile","Mosquito","Snake"],ans:2,fact:"Mosquito kills over 1 million people per year through diseases"},
  {id:13,cat:"Basic Facts",q:"Which is the fastest bird?",opts:["Eagle","Hawk","Peregrine Falcon","Swift"],ans:2,fact:"Peregrine falcon dives at over 320 km/h"},
  {id:14,cat:"Basic Facts",q:"Which animal has the most powerful bite?",opts:["Lion","Hippopotamus","Saltwater Crocodile","Hyena"],ans:2,fact:"Saltwater crocodile has a bite force of 3,700 psi"},
  {id:15,cat:"Basic Facts",q:"Which animal is known as the ship of the desert?",opts:["Horse","Donkey","Camel","Mule"],ans:2,fact:"Camel can survive 30 days without water"},
  {id:16,cat:"Basic Facts",q:"Which animal is known as the king of the jungle?",opts:["Tiger","Elephant","Lion","Leopard"],ans:2,fact:"Lion is called king of the jungle, though it lives in grasslands"},
  {id:17,cat:"Basic Facts",q:"Which is the fastest fish in the ocean?",opts:["Tuna","Marlin","Sailfish","Shark"],ans:2,fact:"Sailfish can swim up to 110 km/h"},
  {id:18,cat:"Basic Facts",q:"Which is the heaviest animal?",opts:["Elephant","Blue Whale","Whale Shark","Hippopotamus"],ans:1,fact:"Blue whale weighs up to 200 tons"},
  {id:19,cat:"Basic Facts",q:"Which is the largest bird by height?",opts:["Emu","Penguin","Ostrich","Flamingo"],ans:2,fact:"Ostrich can reach 2.7 metres tall"},
  {id:20,cat:"Basic Facts",q:"Which land mammal has the most powerful bite?",opts:["Tiger","Hippopotamus","Gorilla","Lion"],ans:1,fact:"Hippopotamus has a bite force of about 1,825 psi"},
  {id:21,cat:"Body & Biology",q:"How many hearts does an octopus have?",opts:["1","2","3","4"],ans:2,fact:"Octopus has 3 hearts: 2 pump blood to gills, 1 to the body"},
  {id:22,cat:"Body & Biology",q:"How many brains does an octopus have?",opts:["1","3","6","9"],ans:3,fact:"Octopus has 9 brains: 1 central + 8 in each arm"},
  {id:23,cat:"Body & Biology",q:"What color is octopus blood?",opts:["Red","Green","Blue","Yellow"],ans:2,fact:"Octopus blood is blue due to hemocyanin (copper-based)"},
  {id:24,cat:"Body & Biology",q:"How many legs does a spider have?",opts:["6","8","10","12"],ans:1,fact:"All spiders have exactly 8 legs"},
  {id:25,cat:"Body & Biology",q:"How many legs does a crab have?",opts:["6","8","10","12"],ans:2,fact:"Crabs have 10 legs, including 2 claws"},
  {id:26,cat:"Body & Biology",q:"Which animal has the highest blood pressure?",opts:["Elephant","Tiger","Giraffe","Horse"],ans:2,fact:"Giraffe's blood pressure is twice that of humans"},

  {id:28,cat:"Body & Biology",q:"How many stomachs does a cow have?",opts:["1","2","3","4"],ans:3,fact:"Cow has 4 stomach compartments"},
  {id:29,cat:"Body & Biology",q:"How many teeth does an elephant have?",opts:["2","6","26","32"],ans:2,fact:"Elephants have 26 teeth: 2 incisors (tusks) + 24 molars"},
  {id:30,cat:"Body & Biology",q:"What is the top of a turtle's shell called?",opts:["Plastron","Scute","Carapace","Shield"],ans:2,fact:"Carapace is the top shell; plastron is the bottom"},
  {id:31,cat:"Body & Biology",q:"What color is polar bear skin under white fur?",opts:["Pink","White","Brown","Black"],ans:3,fact:"Polar bear has black skin to absorb sunlight for warmth"},

  {id:35,cat:"Body & Biology",q:"Which animal has 32 brains and 300 teeth?",opts:["Starfish","Leech","Octopus","Squid"],ans:1,fact:"Leech has 32 brains (ganglia) and 300 teeth"},
  {id:36,cat:"Body & Biology",q:"How many legs does a lobster have?",opts:["6","8","10","12"],ans:2,fact:"Lobster has 10 legs (5 pairs)"},

  {id:38,cat:"Body & Biology",q:"How many tentacles does an octopus have?",opts:["6","8","10","12"],ans:1,fact:"Octopus has 8 arms"},

  {id:42,cat:"Animal Behavior",q:"Which animal can sleep standing up?",opts:["Cow","Horse","Elephant","All of these"],ans:3,fact:"Horses, cows and elephants can all sleep standing up"},

  {id:44,cat:"Animal Behavior",q:"Which animal can hibernate for up to 3 years?",opts:["Bear","Hedgehog","Snail","Frog"],ans:2,fact:"Snails can seal themselves in their shell and hibernate for years"},

  {id:48,cat:"Animal Behavior",q:"Which animal never drinks water in its life?",opts:["Camel","Kangaroo Rat","Desert Fox","Gila Monster"],ans:1,fact:"Kangaroo rat gets all moisture from seeds it eats"},

const CATS = ["All", ...new Set(ALL_QUESTIONS.map(q => q.cat))];
const CAT_ICONS = {"Basic Facts":"🐾","Body & Biology":"🔬","Animal Behavior":"🧠","Classification":"📋","National Animals":"🏳️","Indian Wildlife":"🇮🇳","Marine Life":"🌊","Birds":"🦅","Insects":"🐛","Unusual Facts":"❓","Baby Animals":"🍼","Animal Groups":"👥","Adaptation":"🌿","Conservation":"🌱","UPSC Special":"📝"};
const LABELS = ["A","B","C","D"];

let questions = [], current = 0, score = 0, answered = 0, selected = null, wrongList = [], currentCat = "All";

// Build category list
const catList = document.getElementById("catList");
CATS.filter(c => c !== "All").forEach(cat => {
  const count = ALL_QUESTIONS.filter(q => q.cat === cat).length;
  const btn = document.createElement("button");
  btn.className = "cat-btn";
  btn.innerHTML = `<span>${CAT_ICONS[cat]||"📚"} <strong>${cat}</strong></span><span class="cat-count">${count} Q</span>`;
  btn.onclick = () => startQuiz(cat);
  catList.appendChild(btn);
});

function startQuiz(cat) {
  currentCat = cat;
  const pool = cat === "All" ? ALL_QUESTIONS : ALL_QUESTIONS.filter(q => q.cat === cat);
  questions = [...pool].sort(() => Math.random() - 0.5);
  current = 0; score = 0; answered = 0; selected = null; wrongList = [];
  showScreen("quizScreen");
  renderQuestion();
}

function renderQuestion() {
  const q = questions[current];
  const pct = (current / questions.length) * 100;
  document.getElementById("progressBar").style.width = pct + "%";
  document.getElementById("qCat").textContent = currentCat;
  document.getElementById("qScore").textContent = score + "/" + answered;
  document.getElementById("qNumber").textContent = "Question " + (current+1) + " of " + questions.length;
  document.getElementById("qCatTag").textContent = q.cat;
  document.getElementById("qText").textContent = q.q;
  document.getElementById("factBox").style.display = "none";
  document.getElementById("nextBtn").style.display = "none";
  selected = null;

  const wrap = document.getElementById("optionsWrap");
  wrap.innerHTML = "";
  q.opts.forEach((opt, idx) => {
    const btn = document.createElement("button");
    btn.className = "opt-btn";
    btn.innerHTML = `<span class="opt-letter">${LABELS[idx]}</span>${opt}<span class="opt-icon"></span>`;
    btn.onclick = () => handleAnswer(idx);
    wrap.appendChild(btn);
  });
}

function handleAnswer(idx) {
  if (selected !== null) return;
  selected = idx;
  answered++;
  const q = questions[current];
  const btns = document.querySelectorAll(".opt-btn");

  if (idx === q.ans) {
    score++;
    btns[idx].classList.add("correct");
    btns[idx].querySelector(".opt-icon").textContent = "✅";
  } else {
    btns[idx].classList.add("wrong");
    btns[idx].querySelector(".opt-icon").textContent = "❌";
    btns[q.ans].classList.add("correct");
    btns[q.ans].querySelector(".opt-icon").textContent = "✅";
    wrongList.push(q);
  }

  btns.forEach(b => b.disabled = true);
  document.getElementById("factText").textContent = q.fact;
  document.getElementById("factBox").style.display = "block";
  const nextBtn = document.getElementById("nextBtn");
  nextBtn.style.display = "block";
  nextBtn.textContent = current + 1 >= questions.length ? "🏁 See Results" : "Next Question →";
  document.getElementById("qScore").textContent = score + "/" + answered;
}

function nextQuestion() {
  if (current + 1 >= questions.length) {
    showResults();
  } else {
    current++;
    renderQuestion();
  }
}

function showResults() {
  const pct = Math.round((score / questions.length) * 100);
  const grades = [
    [90, "#00e676", "Excellent! 🏆"],
    [75, "#40c4ff", "Very Good! 🌟"],
    [60, "#ffea00", "Good! 👍"],
    [40, "#ff9100", "Average 📚"],
    [0,  "#ff5252", "Needs Practice 💪"]
  ];
  const [, color, label] = grades.find(([min]) => pct >= min);

  document.getElementById("resPct").textContent = pct + "%";
  document.getElementById("resPct").style.color = color;
  document.getElementById("resGrade").textContent = label;
  document.getElementById("resGrade").style.color = color;
  document.getElementById("resDetail").textContent = `You scored ${score} out of ${questions.length}`;
  document.getElementById("rsCorrect").textContent = score;
  document.getElementById("rsWrong").textContent = questions.length - score;
  document.getElementById("rsScore").textContent = pct + "%";

  const wrongSec = document.getElementById("wrongSection");
  if (wrongList.length > 0) {
    wrongSec.style.display = "block";
    document.getElementById("wrongTitle").textContent = `❌ Review Wrong Answers (${wrongList.length})`;
    const wl = document.getElementById("wrongList");
    wl.innerHTML = wrongList.map(wq => `
      <div class="wrong-item">
        <div class="wrong-q">${wq.q}</div>
        <div class="wrong-ans">✅ ${wq.opts[wq.ans]}</div>
        <div class="wrong-fact">💡 ${wq.fact}</div>
      </div>`).join("");
  } else {
    wrongSec.style.display = "none";
  }

  showScreen("resultsScreen");
}

function retryQuiz() { startQuiz(currentCat); }
function goMenu() { showScreen("menuScreen"); }
function showScreen(id) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  window.scrollTo(0, 0);
}
</script>
